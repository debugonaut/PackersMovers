<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Title -->
    <title>SwiftMove — Packers & Movers | Trusted Relocation Services</title>

    <!-- SEO: Meta Description (150-160 chars) -->
    <meta
      name="description"
      content="SwiftMove offers trusted home shifting, office relocation, vehicle transport & warehouse storage. Professional packers and movers. Get a free quote today."
    />

    <!-- SEO: Additional Metadata -->
    <meta name="author" content="SwiftMove" />
    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="rating" content="general" />
    <meta name="robots" content="index, follow" />

    <!-- SEO: Canonical -->
    <link rel="canonical" href="https://yourdomainhere.com" />

    <!-- Performance: Preload Hero Background Image -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2070&auto=format&fit=crop" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="SwiftMove — Packers & Movers | Trusted Relocation Services" />
    <meta
      property="og:description"
      content="SwiftMove offers trusted home shifting, office relocation, vehicle transport & warehouse storage. Professional packers and movers. Get a free quote today."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomainhere.com" />
    <meta property="og:image" content="https://images.unsplash.com/photo-1580674285054-bed31e145f59?q=80&w=1200&h=630&auto=format&fit=crop" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="SwiftMove" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SwiftMove — Packers & Movers | Trusted Relocation Services" />

      name="twitter:description"
      content="SwiftMove offers trusted home shifting, office relocation, vehicle transport & warehouse storage. Professional packers and movers. Get a free quote today."

    <!-- Google Fonts: Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: Syne (400,600,700,800) + DM Sans (300,400,500,600) -->

      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#E8480A" />

          "https://www.facebook.com/yourprofile",
          "https://www.twitter.com/yourprofile",
